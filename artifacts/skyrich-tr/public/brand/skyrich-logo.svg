<svg xmlns="http://www.w3.org/2000/svg" width="2172" height="724" viewBox="0 0 2172 724" role="img" aria-labelledby="title desc">
  <title id="title">Skyrich Türkiye Resmi Distribütörü Premium Logo Banner</title>
  <desc id="desc">Black premium distributor banner with Skyrich identity, Chinese green power slogan, and Türkiye official distributor text. Stock code removed.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020303"/>
      <stop offset="0.45" stop-color="#070908"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="whiteMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f6f6f6"/>
      <stop offset="1" stop-color="#cfcfcf"/>
    </linearGradient>
    <linearGradient id="greenMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#72df22"/>
      <stop offset="0.55" stop-color="#37a915"/>
      <stop offset="1" stop-color="#155e08"/>
    </linearGradient>
    <linearGradient id="blueBolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18c8ff"/>
      <stop offset="0.5" stop-color="#008ee8"/>
      <stop offset="1" stop-color="#0056a8"/>
    </linearGradient>
    <linearGradient id="battery" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#707070"/>
      <stop offset="1" stop-color="#2f2f2f"/>
    </linearGradient>
    <linearGradient id="shieldGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#286f10"/>
      <stop offset="1" stop-color="#103d08"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <filter id="greenGlow" x="-30%" y="-70%" width="160%" height="240%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#ffffff" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="2172" height="724" fill="url(#bg)"/>
  <rect width="2172" height="724" fill="#000" opacity="0.18"/>

  <!-- subtle vertical texture -->
  <g opacity="0.06">
    <rect x="0" y="0" width="2172" height="2" fill="#ffffff"/>
    <rect x="0" y="118" width="2172" height="1" fill="#ffffff"/>
    <rect x="0" y="603" width="2172" height="1" fill="#ffffff"/>
  </g>

  <!-- Center separator -->
  <line x1="1110" y1="141" x2="1110" y2="610" stroke="#40a915" stroke-width="3" opacity="0.75"/>

  <!-- Left brand block -->
  <g filter="url(#softShadow)">
    <text x="132" y="298" fill="url(#whiteMetal)" font-family="'Microsoft YaHei','Noto Sans CJK SC','Arial Black',sans-serif" font-size="190" font-weight="900" letter-spacing="16">天丰电源</text>

    <text x="126" y="520" fill="url(#whiteMetal)" font-family="Arial Black, Impact, sans-serif" font-size="168" font-weight="900" letter-spacing="-10">Sk</text>
    <polygon points="452,405 548,405 499,468 594,468 398,566 454,494 360,494" fill="url(#blueBolt)" filter="url(#textGlow)"/>
    <text x="510" y="520" fill="url(#whiteMetal)" font-family="Arial Black, Impact, sans-serif" font-size="168" font-weight="900" letter-spacing="-8">rich</text>

    <!-- Battery icon -->
    <g transform="translate(862 395)">
      <rect x="0" y="0" rx="28" ry="28" width="142" height="91" fill="url(#battery)" stroke="#777" stroke-width="2"/>
      <text x="33" y="59" fill="#fff" font-family="Arial, sans-serif" font-size="52" font-weight="800">+</text>
      <text x="90" y="57" fill="#fff" font-family="Arial, sans-serif" font-size="52" font-weight="800">−</text>
    </g>

    <!-- Powersport Batteries line -->
    <line x1="132" y1="574" x2="253" y2="574" stroke="#777" stroke-width="4"/>
    <text x="290" y="588" fill="#8d8d8d" font-family="Montserrat, Arial, sans-serif" font-size="43" font-weight="600" letter-spacing="13">POWERSPORT BATTERIES</text>
    <line x1="918" y1="574" x2="1008" y2="574" stroke="#777" stroke-width="4"/>
  </g>

  <!-- Right green power block -->
  <g filter="url(#softShadow)">
    <text x="1200" y="233" fill="url(#greenMetal)" font-family="'Microsoft YaHei','Noto Sans CJK SC','Arial Black',sans-serif" font-size="90" font-weight="900" letter-spacing="7">绿色电源的倡导者</text>

    <g transform="translate(1200 313)">
      <line x1="0" y1="0" x2="85" y2="0" stroke="#49b51c" stroke-width="3"/>
      <text x="105" y="16" fill="#42b415" font-family="Montserrat, Arial, sans-serif" font-size="48" font-weight="800" letter-spacing="9">GREEN POWER REVOLUTION</text>
      <line x1="817" y1="0" x2="900" y2="0" stroke="#49b51c" stroke-width="3"/>
    </g>
    <g filter="url(#greenGlow)">
      <line x1="1200" y1="389" x2="2100" y2="389" stroke="#46b915" stroke-width="3" opacity="0.85"/>
      <ellipse cx="1642" cy="389" rx="134" ry="8" fill="#63ff29" opacity="0.45"/>
    </g>

    <!-- Turkish distributor block -->
    <g transform="translate(1258 430)">
      <path d="M70 0 C38 5 17 13 0 24 L0 102 C0 164 37 205 70 221 C103 205 140 164 140 102 L140 24 C123 13 102 5 70 0 Z" fill="url(#shieldGreen)" stroke="#f5f5f5" stroke-width="4"/>
      <path d="M80 74 C58 50 18 64 16 103 C14 142 57 159 82 132 C61 143 35 132 36 105 C37 78 61 66 80 74 Z" fill="#ffffff"/>
      <polygon points="91,97 98,108 111,106 102,116 107,128 95,122 84,130 87,117 77,109 90,108" fill="#ffffff"/>
    </g>
    <text x="1450" y="498" fill="url(#whiteMetal)" font-family="Montserrat, Arial, sans-serif" font-size="87" font-weight="900" letter-spacing="31">TÜRKİYE</text>
    <text x="1450" y="581" fill="#f3f3f3" font-family="Montserrat, Arial, sans-serif" font-size="43" font-weight="700" letter-spacing="13">RESMİ DİSTRİBÜTÖRÜ</text>
  </g>
</svg>
